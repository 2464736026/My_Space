edition: 1.0.0
name: resume-analyzer
access: default

vars:
  region: cn-hangzhou

services:
  resume-analyzer:
    component: fc
    props:
      region: ${vars.region}
      service:
        name: resume-analyzer
        description: 'AI Resume Analyzer Service'
        internetAccess: true
      function:
        name: api
        description: 'Resume analyzer API'
        runtime: python3.10
        codeUri: ./
        handler: index.handler
        timeout: 60
        memorySize: 1024
        environmentVariables:
          OPENAI_API_KEY: sk-R4Z3s07Fvg0nuvLlLtmMNe7EGRhv8DLhmlicxy9x6tEPRd7m
          OPENAI_MODEL: gpt-3.5-turbo
          OPENAI_BASE_URL: https://api.openai-proxy.org/v1
      triggers:
        - name: httpTrigger
          type: http
          config:
            authType: anonymous
            methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
